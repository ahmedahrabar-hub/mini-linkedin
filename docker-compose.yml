version: '3.8'
services:
  app:
    build: .
    container_name: mini-linkedin-app
    ports:
      - "8400:8000"
    volumes:
      - .:/var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - db
  db:
    image: mysql:8
    container_name: mini-linkedin-db
    restart: always
    environment:
      MYSQL_DATABASE: mini_linkedin
      MYSQL_USER: tp_user
      MYSQL_PASSWORD: tp_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3309:3306"
    volumes:
      - dbdata:/var/lib/mysql
volumes:
  dbdata: